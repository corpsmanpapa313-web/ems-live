<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>RECEIVER - Command Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .box { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 450px; }
        #video-container { 
            position: absolute; top: 20px; right: 20px; width: 400px; 
            background: #000; border-radius: 10px; overflow: hidden; border: 2px solid #333;
        }
        video { width: 100%; display: block; }
        button { padding: 12px 24px; background: #007bff; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        input { padding: 11px; border: 1px solid #ddd; border-radius: 6px; width: 150px; }
    </style>
</head>
<body>

    <div class="box">
        <h3>ศูนย์สั่งการ EMS</h3>
        <input type="text" id="targetId" value="NAVY-EMS-01">
        <button onclick="connect()">[ 2 ] ดูภาพสด</button>
        <p id="info" style="font-size: 12px; color: #888;">กำลังโหลดระบบ...</p>
    </div>

    <div id="video-container">
        <div style="background: #222; color: #0f0; padding: 5px 10px; font-size: 12px;">🔴 LIVE MONITOR</div>
        <video id="remoteVideo" autoplay playsinline controls></video>
    </div>

    <script>
        const peer = new Peer(); // สุ่ม ID เอง

        peer.on('open', id => {
            document.getElementById('info').innerText = "ระบบศูนย์พร้อมแล้ว (ID: " + id + ")";
        });

        function connect() {
            const tid = document.getElementById('targetId').value;
            document.getElementById('info').innerText = "กำลังเชื่อมต่อไปยัง " + tid + "...";
            
            // ใช้ MediaStream เปล่าเพื่อเริ่มการเชื่อมต่อ
            const call = peer.call(tid, new MediaStream());
            
            call.on('stream', remoteStream => {
                const video = document.getElementById('remoteVideo');
                video.srcObject = remoteStream;
                // บังคับให้เล่นวิดีโอ (ป้องกัน Browser บล็อก)
                video.play().catch(e => console.log("Auto-play blocked, wait for user interaction"));
                document.getElementById('info').innerText = "เชื่อมต่อสำเร็จ!";
            });

            call.on('error', err => {
                alert("การเชื่อมต่อผิดพลาด: " + err);
                document.getElementById('info').innerText = "การเชื่อมต่อล้มเหลว";
            });
        }
    </script>
</body>
</html>
