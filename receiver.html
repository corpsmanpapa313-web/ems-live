<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RECEIVER</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        video { width: 100%; max-width: 600px; background: #000; }
        button { padding: 10px 20px; background: #007bff; color: #fff; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>ศูนย์สั่งการ</h2>
    <input type="text" id="id" value="NAVY-EMS-01">
    <button onclick="connect()">[ 2 ] ดูภาพสด</button>
    <hr>
    <video id="remoteVideo" autoplay playsinline controls></video>
    <script>
        const peer = new Peer(); // ห้ามใส่ ID ในนี้เด็ดขาด
        function connect() {
            const call = peer.call(document.getElementById('id').value, new MediaStream());
            call.on('stream', s => document.getElementById('remoteVideo').srcObject = s);
        }
    </script>
</body>
</html>
