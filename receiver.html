<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>RECEIVER - Command Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .box { background: #fff; padding: 20px; border-radius: 10px; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #video-box { 
            position: absolute; top: 20px; right: 20px; width: 500px; 
            background: #000; border: 3px solid #333; border-radius: 10px;
        }
        video { width: 100%; display: block; background: #000; min-height: 300px; }
        button { padding: 12px 24px; background: #007bff; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        input { padding: 11px; border: 1px solid #ddd; border-radius: 6px; width: 160px; }
    </style>
</head>
<body>

    <div class="box">
        <h3>ศูนย์สั่งการ EMS</h3>
        <input type="text" id="targetId" value="NAVY-EMS-01">
        <button onclick="connect()">[ 2 ] ดูภาพสด</button>
        <p id="info" style="font-size:12px; color:#888;">ระบบพร้อม...</p>
    </div>

    <div id="video-box">
        <div style="background:#222; color:#0f0; padding:10px;">🔴 LIVE MONITOR</div>
        <video id="remoteVideo" autoplay playsinline controls></video>
        <div style="padding:10px; background:#111;">
            <button onclick="forcePlay()" style="background:#dc3545; width:100%;">ถ้าจอดำ ให้กดปุ่มนี้เพื่อบังคับเล่นภาพ</button>
        </div>
    </div>

    <script>
        const peer = new Peer();
        const v = document.getElementById('remoteVideo');

        function connect() {
            const tid = document.getElementById('targetId').value;
            document.getElementById('info').innerText = "กำลังเชื่อมต่อ...";
            const call = peer.call(tid, new MediaStream());
            
            call.on('stream', s => {
                console.log("ได้รับสัญญาณภาพแล้ว!");
                v.srcObject = s;
                v.play().catch(e => {
                    console.log("Browser บล็อกภาพ ต้องกดปุ่มสีแดง");
                    document.getElementById('info').innerText = "ได้รับภาพแล้ว แต่ถูกบล็อก กรุณากดปุ่มสีแดง!";
                });
            });
        }

        function forcePlay() {
            v.play();
            document.getElementById('info').innerText = "กำลังพยายามเล่นภาพ...";
        }
    </script>
</body>
</html>
