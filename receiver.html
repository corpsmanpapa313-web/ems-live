<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>EMS RECEIVER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .box { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; }
        #video-container { 
            position: absolute; top: 20px; right: 20px; width: 500px; 
            background: #000; border-radius: 10px; border: 3px solid #333; overflow: hidden;
        }
        video { width: 100%; display: block; background: #000; }
        input { padding: 15px; border: 1px solid #ddd; border-radius: 8px; width: 220px; font-size: 18px; margin-bottom: 10px; }
        button { padding: 15px 30px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #info { color: #666; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>ศูนย์รับสัญญาณภาพ</h2>
        <input type="text" id="targetId" placeholder="ใส่ ID จากกล้องที่นี่">
        <br>
        <button onclick="connectToCamera()">[ 2 ] เรียกดูภาพสด</button>
        <p id="info">รอการระบุ ID...</p>
    </div>

    <div id="video-container">
        <video id="remoteVideo" autoplay playsinline controls></video>
        <button onclick="document.getElementById('remoteVideo').play()" style="width:100%; background:#dc3545;">ถ้าจอดำ ให้กดตรงนี้เพื่อเล่นวิดีโอ</button>
    </div>

    <script>
        const peer = new Peer();
        const v = document.getElementById('remoteVideo');

        function connectToCamera() {
            const tid = document.getElementById('targetId').value;
            if(!tid) { alert("กรุณาใส่ ID ของกล้องก่อน"); return; }
            
            document.getElementById('info').innerText = "กำลังเชื่อมต่อ...";
            const call = peer.call(tid, new MediaStream());
            
            call.on('stream', stream => {
                v.srcObject = stream;
                v.play().catch(e => {
                    document.getElementById('info').innerText = "ได้รับภาพแล้ว (กรุณากดปุ่มสีแดง)";
                });
                document.getElementById('info').innerText = "เชื่อมต่อสำเร็จ!";
            });
        }
    </script>
</body>
</html>
