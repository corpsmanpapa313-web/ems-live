<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>SENDER - VM780</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: sans-serif; padding: 15px; }
        video { width: 100%; border-radius: 10px; background: #222; }
        button { width: 100%; padding: 20px; font-size: 20px; background: #28a745; color: white; border: none; border-radius: 12px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div style="margin-bottom:10px;">ID: <span id="my-id" style="color:#fff;">Loading...</span></div>
    <video id="localVideo" autoplay muted playsinline></video>
    <button onclick="start()">[ 1 ] เปิดกล้องส่งสัญญาณ</button>
    <div id="status" style="margin-top:10px; color:#888;">สถานะ: รอเปิดกล้อง</div>

    <script>
        const peer = new Peer('NAVY-EMS-01', {
            config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
        });
        let localStream;
        peer.on('open', id => document.getElementById('my-id').innerText = id);
        
        async function start() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}, audio: true});
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('status').innerText = "กล้องพร้อมส่งภาพ...";
            } catch (e) { alert("Error: " + e); }
        }

        peer.on('call', call => {
            console.log("ศูนย์กำลังเรียกดู...");
            document.getElementById('status').innerText = "🔴 กำลังส่งภาพสด...";
            call.answer(localStream);
        });
    </script>
</body>
</html>
