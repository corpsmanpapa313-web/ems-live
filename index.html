<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAVY EMS SENDER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        body { background: #121212; color: #00ff00; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; }
        .id-label { background: #222; padding: 10px; border-radius: 5px; border: 1px solid #333; margin-bottom: 10px; }
        video { width: 100%; max-width: 500px; border-radius: 10px; background: #000; border: 2px solid #333; }
        button { padding: 20px; width: 90%; font-size: 20px; background: #28a745; color: white; border: none; border-radius: 10px; margin-top: 15px; font-weight: bold; cursor: pointer; }
        .status { color: #888; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="id-label">ID: <span id="my-id">Connecting...</span></div>
    <video id="localVideo" autoplay muted playsinline></video><br>
    <button onclick="startStream()">[ 1 ] เปิดกล้องส่งสัญญาณ</button>
    <div id="status" class="status">สถานะ: รอการกดเปิดกล้อง</div>

    <script>
        // ใช้ Google STUN Server ช่วยนำทางข้อมูล
        const peer = new Peer('NAVY-EMS-01', {
            config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] }
        });

        let localStream;

        peer.on('open', id => {
            document.getElementById('my-id').innerText = id;
            document.getElementById('status').innerText = "ระบบพร้อมแล้ว (Ready)";
        });

        async function startStream() {
            try {
                // เลือกใช้กล้องหลังของ VM780
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: true
                });
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('status').innerText = "กล้องทำงานแล้ว รอศูนย์เรียกดู...";
            } catch (err) {
                alert("เข้าถึงกล้องไม่ได้: " + err);
            }
        }

        // เมื่อมีคนโทรเข้ามา ให้ส่งภาพไปให้เขา
        peer.on('call', call => {
            console.log("Incoming call...");
            document.getElementById('status').innerText = "🔴 กำลังไลฟ์สดไปยังศูนย์...";
            call.answer(localStream); 
        });

        peer.on('error', err => {
            console.error(err);
            if(err.type === 'unavailable-id') alert('ID นี้มีคนใช้งานอยู่แล้ว');
        });
    </script>
</body>
</html>
