<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SENDER</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: sans-serif; }
        video { width: 100%; max-width: 400px; background: #222; }
        button { padding: 20px; width: 80%; font-size: 20px; background: #28a745; color: white; border: none; border-radius: 10px; margin: 10px; }
    </style>
</head>
<body>
    <h3>ID: <span id="my-id">กำลังโหลด...</span></h3>
    <video id="localVideo" autoplay muted playsinline></video><br>
    <button onclick="start()">[ 1 ] เปิดกล้อง</button>
    <script>
        const peer = new Peer('NAVY-EMS-01', {
            config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}
        });
        let stream;
        peer.on('open', id => document.getElementById('my-id').innerText = id);
        async function start() {
            stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}, audio: true});
            document.getElementById('localVideo').srcObject = stream;
        }
        peer.on('call', call => call.answer(stream));
    </script>
</body>
</html>
